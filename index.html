<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Coiffeurs — Anne Laure & Orlando</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✂</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --creme: #F2EDE4;
    --creme-dark: #E8E2D8;
    --noir: #141414;
    --noir-soft: #2A2826;
    --blanc: #FDFAF6;
    --accent: #1A1A1A;
    --rouge: #8B2E2E;
    --font-titre: 'Cormorant Garamond', Georgia, serif;
    --font-corps: 'Montserrat', Helvetica, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--creme);
    color: var(--noir);
    font-family: var(--font-corps);
    font-weight: 300;
    overflow-x: hidden;
  }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: var(--creme); }
  ::-webkit-scrollbar-thumb { background: var(--noir); }

  /* ─── NAV ─── */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 24px 48px;
    background: linear-gradient(to bottom, rgba(242,237,228,0.72) 0%, transparent 100%);
    transition: all 0.5s ease;
  }

  .nav.scrolled {
    background: rgba(242,237,228,0.95);
    backdrop-filter: blur(16px);
    padding: 16px 48px;
    border-bottom: 1px solid rgba(20,20,20,0.1);
    mix-blend-mode: normal;
  }

  .nav-left {
    display: flex;
    gap: 32px;
    align-items: center;
  }

  .nav-right {
    display: flex;
    gap: 32px;
    align-items: center;
    justify-content: flex-end;
  }

  .nav-link {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--noir);
    text-decoration: none;
    opacity: 0.55;
    transition: opacity 0.3s;
  }
  .nav-link:hover { opacity: 1; }

  .nav-logo {
    font-family: var(--font-titre);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--noir);
    text-align: center;
    cursor: pointer;
    line-height: 1.2;
  }

  .nav-cta-v2 {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--blanc);
    background: var(--noir);
    padding: 10px 22px;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
  }
  .nav-cta-v2:hover { background: var(--noir-soft); }

  /* ─── HERO ─── */
  .hero-v2 {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    position: relative;
    overflow: hidden;
  }

  .hero-left {
    background: var(--creme);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 160px 60px 240px;
    position: relative;
    z-index: 2;
  }

  .hero-issue {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(20,20,20,0.35);
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .hero-issue::before {
    content: '';
    width: 32px;
    height: 1px;
    background: currentColor;
  }

  .hero-big-title {
    font-family: var(--font-titre);
    font-size: clamp(72px, 8vw, 128px);
    font-weight: 300;
    line-height: 0.9;
    color: var(--noir);
    margin-bottom: 40px;
    letter-spacing: -0.01em;
  }

  .hero-big-title .italic {
    font-style: italic;
    font-weight: 300;
    display: block;
  }

  .hero-location {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 52px;
  }

  .hero-location-line {
    flex: 1;
    max-width: 60px;
    height: 1px;
    background: var(--noir);
    opacity: 0.3;
  }

  .hero-location-text {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(20,20,20,0.5);
  }

  .hero-ctas-v2 {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .btn-dark {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--blanc);
    background: var(--noir);
    padding: 16px 40px;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
  }
  .btn-dark:hover { background: #2A2826; transform: translateY(-1px); }

  .btn-outline-dark {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--noir);
    background: transparent;
    padding: 16px 40px;
    border: 1px solid rgba(20,20,20,0.25);
    cursor: pointer;
    transition: all 0.3s;
  }
  .btn-outline-dark:hover { border-color: var(--noir); }

  .hero-right {
    position: relative;
    overflow: hidden;
    background: var(--noir);
  }

  .hero-right img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.8;
    animation: heroZoom 18s ease-in-out infinite alternate;
    display: block;
  }

  @keyframes heroZoom {
    from { transform: scale(1.0); }
    to { transform: scale(1.07); }
  }

  .hero-right-caption {
    position: absolute;
    bottom: 48px;
    left: 40px;
    right: 40px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .hero-caption-tag {
    font-family: var(--font-titre);
    font-style: italic;
    font-size: 18px;
    color: rgba(242,237,228,0.7);
  }

  .hero-caption-num {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.3em;
    color: rgba(242,237,228,0.4);
    text-transform: uppercase;
    writing-mode: vertical-rl;
  }

  /* scroll bar vertical */
  .hero-scroll-v2 {
    position: absolute;
    bottom: 40px;
    left: 60px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 3;
  }

  .scroll-v2-line {
    width: 40px;
    height: 1px;
    background: var(--noir);
    opacity: 0.3;
    animation: scrollExpand 2s ease-in-out infinite;
    transform-origin: left;
  }

  @keyframes scrollExpand {
    0%, 100% { transform: scaleX(1); opacity: 0.3; }
    50% { transform: scaleX(1.4); opacity: 0.6; }
  }

  /* ─── MARQUEE ─── */
  .marquee-bar {
    background: var(--noir);
    padding: 14px 0;
    overflow: hidden;
    white-space: nowrap;
  }

  .marquee-inner {
    display: inline-flex;
    gap: 0;
    animation: marqueeScroll 18s linear infinite;
  }

  .marquee-item {
    font-family: var(--font-titre);
    font-style: italic;
    font-size: 15px;
    color: rgba(242,237,228,0.6);
    padding: 0 40px;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .marquee-sep {
    color: rgba(242,237,228,0.2);
    padding: 0 8px;
  }

  @keyframes marqueeScroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* ─── ABOUT STRIP ─── */
  .about-strip {
    display: grid;
    grid-template-columns: 1fr 2px 1fr 2px 2fr;
    padding: 80px 80px;
    gap: 60px;
    align-items: center;
    border-bottom: 1px solid rgba(20,20,20,0.08);
  }

  .about-strip-divider {
    background: rgba(20,20,20,0.1);
    height: 80px;
    align-self: center;
  }

  .about-item {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .about-num {
    font-family: var(--font-titre);
    font-size: 56px;
    font-weight: 300;
    line-height: 1;
    color: var(--noir);
  }

  .about-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(20,20,20,0.4);
  }

  /* ─── SERVICES V2 ─── */
  .services-v2 {
    padding: 120px 0;
    background: var(--blanc);
  }

  .services-v2-header {
    padding: 0 80px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: end;
    margin-bottom: 80px;
  }

  .services-v2 .section-title {
    font-family: var(--font-titre);
    font-size: clamp(48px, 5vw, 80px);
    font-weight: 300;
    line-height: 1.0;
    color: var(--noir);
  }

  .services-v2-desc {
    font-size: 14px;
    font-weight: 300;
    line-height: 1.9;
    color: rgba(20,20,20,0.55);
    max-width: 380px;
  }

  .services-v2-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid rgba(20,20,20,0.1);
    padding: 0 80px;
    margin-bottom: 0;
  }

  .service-tab {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(20,20,20,0.35);
    padding: 16px 32px;
    border: none;
    background: transparent;
    cursor: pointer;
    transition: all 0.3s;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }

  .service-tab.active {
    color: var(--noir);
    border-bottom-color: var(--noir);
  }

  .service-tab:hover { color: var(--noir); }

  .service-panel {
    display: none;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .service-panel.active { display: grid; }

  .service-panel-left {
    padding: 64px 80px;
    background: var(--blanc);
  }

  .service-panel-right {
    background: var(--creme);
    overflow: hidden;
    position: relative;
    min-height: 480px;
  }

  .service-panel-right img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.8s ease;
  }

  .service-panel:hover .service-panel-right img { transform: scale(1.04); }

  .service-list-v2 {
    list-style: none;
    display: flex;
    flex-direction: column;
  }

  .service-row-v2 {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 20px 0;
    border-bottom: 1px solid rgba(20,20,20,0.07);
    gap: 20px;
  }

  .service-row-v2:last-child { border-bottom: none; }

  .service-row-name {
    font-family: var(--font-titre);
    font-size: 22px;
    font-weight: 400;
    color: var(--noir);
  }

  .service-row-dots {
    flex: 1;
    height: 1px;
    background: repeating-linear-gradient(to right, rgba(20,20,20,0.12) 0, rgba(20,20,20,0.12) 3px, transparent 3px, transparent 8px);
    min-width: 20px;
    align-self: center;
  }

  .service-row-price {
    font-size: 13px;
    font-weight: 300;
    color: rgba(20,20,20,0.5);
    white-space: nowrap;
  }

  .service-panel-cta {
    margin-top: 40px;
  }

  /* ─── GALERIE V2 ─── */
  .galerie-v2 {
    padding: 120px 0;
    background: var(--creme);
  }

  .galerie-v2-header {
    padding: 0 80px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 48px;
  }

  .galerie-v2 .section-eyebrow {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .galerie-v2 .eyebrow-line {
    width: 32px;
    height: 1px;
    background: var(--noir);
    opacity: 0.3;
  }

  .galerie-v2 .eyebrow-text {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(20,20,20,0.4);
  }

  .galerie-v2 .section-title {
    font-family: var(--font-titre);
    font-size: clamp(44px, 5vw, 72px);
    font-weight: 300;
    line-height: 1.0;
    color: var(--noir);
  }

  .galerie-v2-strip {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr 1.4fr;
    gap: 3px;
    padding: 0 0;
  }

  .gal-item-v2 {
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }

  .gal-item-v2 img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.7s ease;
    min-height: 500px;
  }

  .gal-item-v2:hover img { transform: scale(1.05); }

  .gal-item-v2::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(20,20,20,0);
    transition: background 0.4s;
  }

  .gal-item-v2:hover::after { background: rgba(20,20,20,0.1); }

  /* ─── AVIS V2 CAROUSEL ─── */
  .avis-v2 {
    padding: 120px 0;
    background: var(--noir);
    overflow: hidden;
  }
  .avis-v2-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 56px;
    padding: 0 80px;
  }
  .avis-v2 .section-title {
    font-family: var(--font-titre);
    font-size: clamp(44px, 4vw, 68px);
    font-weight: 300;
    line-height: 1.05;
    color: var(--creme);
  }
  .avis-v2-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 14px;
  }
  .avis-v2-sub {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.15em;
    color: rgba(242,237,228,0.3);
  }
  .avis-nav {
    display: flex;
    gap: 8px;
  }
  .avis-nav-btn {
    width: 40px;
    height: 40px;
    border: 1px solid rgba(242,237,228,0.15);
    background: transparent;
    color: rgba(242,237,228,0.5);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    line-height: 1;
  }
  .avis-nav-btn:hover { border-color: rgba(242,237,228,0.5); color: var(--creme); }
  .avis-track-outer { overflow: hidden; padding: 0 80px; }
  .avis-track {
    display: flex;
    gap: 2px;
    transition: transform 0.6s cubic-bezier(0.77,0,0.175,1);
  }
  .avis-v2-card {
    flex: 0 0 calc(33.333% - 2px);
    background: rgba(242,237,228,0.03);
    padding: 48px 44px;
    transition: background 0.4s;
    border-top: 1px solid rgba(242,237,228,0.07);
    min-width: 0;
  }
  .avis-v2-card:hover { background: rgba(242,237,228,0.06); }
  .avis-v2-num {
    font-family: var(--font-titre);
    font-size: 52px;
    font-weight: 300;
    color: rgba(242,237,228,0.04);
    line-height: 1;
    margin-bottom: 14px;
  }
  .avis-v2-stars { display: flex; gap: 3px; margin-bottom: 18px; }
  .avis-v2-star { font-size: 11px; color: rgba(242,237,228,0.4); }
  .avis-v2-text {
    font-family: var(--font-titre);
    font-style: italic;
    font-size: 20px;
    font-weight: 300;
    line-height: 1.65;
    color: rgba(242,237,228,0.82);
    margin-bottom: 24px;
  }
  .avis-v2-author {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(242,237,228,0.28);
  }
  .avis-v2-date {
    font-size: 10px;
    font-weight: 300;
    color: rgba(242,237,228,0.16);
    margin-top: 3px;
    letter-spacing: 0.08em;
  }
  .avis-dots {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 36px 80px 0;
  }
  .avis-dot {
    height: 1px;
    background: rgba(242,237,228,0.18);
    cursor: pointer;
    transition: all 0.4s;
    width: 20px;
  }
  .avis-dot.active { width: 40px; background: rgba(242,237,228,0.55); }

  /* ─── RESERVATION V2 ─── */
  .res-v2 {
    background: var(--blanc);
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 600px;
  }

  .res-v2-left {
    padding: 100px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-right: 1px solid rgba(20,20,20,0.08);
  }

  .res-v2 .section-eyebrow {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .res-v2 .eyebrow-line { width: 32px; height: 1px; background: var(--noir); opacity: 0.25; }
  .res-v2 .eyebrow-text {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(20,20,20,0.4);
  }

  .res-v2 .section-title {
    font-family: var(--font-titre);
    font-size: clamp(44px, 4vw, 68px);
    font-weight: 300;
    line-height: 1.0;
    color: var(--noir);
    margin-bottom: 32px;
  }

  .res-v2-desc {
    font-size: 14px;
    font-weight: 300;
    line-height: 1.9;
    color: rgba(20,20,20,0.5);
    margin-bottom: 48px;
    max-width: 400px;
  }

  .res-v2-contact {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 48px;
  }

  .res-v2-item {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(20,20,20,0.06);
  }

  .res-v2-item-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(20,20,20,0.3);
    min-width: 72px;
    padding-top: 2px;
  }

  .res-v2-item-val {
    font-size: 13px;
    font-weight: 300;
    color: var(--noir);
    line-height: 1.6;
  }

  .res-v2-right {
    padding: 80px 60px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding-top: 100px;
    background: var(--creme);
  }

  .planity-v2 {
    background: var(--blanc);
    border: 1px solid rgba(20,20,20,0.1);
  }

  .planity-v2-header {
    padding: 28px 32px;
    border-bottom: 1px solid rgba(20,20,20,0.07);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .planity-v2-title {
    font-family: var(--font-titre);
    font-size: 22px;
    font-weight: 400;
    color: var(--noir);
  }

  .planity-v2-badge {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(20,20,20,0.3);
  }

  .planity-v2-body {
    padding: 32px;
  }

  .planity-v2-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(20,20,20,0.4);
    margin-bottom: 14px;
  }

  .planity-v2-slots {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 24px;
  }

  .planity-v2-slot {
    padding: 11px 8px;
    border: 1px solid rgba(20,20,20,0.1);
    font-size: 12px;
    font-weight: 400;
    color: var(--noir);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    background: transparent;
  }

  .planity-v2-slot:hover { background: var(--creme); border-color: rgba(20,20,20,0.25); }
  .planity-v2-slot.selected { background: var(--noir); color: var(--blanc); border-color: var(--noir); }

  .planity-v2-note {
    font-size: 10px;
    color: rgba(20,20,20,0.3);
    letter-spacing: 0.08em;
    text-align: center;
    padding-top: 16px;
    border-top: 1px solid rgba(20,20,20,0.06);
  }

  /* ─── FOOTER V2 ─── */

function Avis({ t }) {
  const PER_PAGE = 3;
  const total = t.avis.length;
  const pages = Math.ceil(total / PER_PAGE);
  const [page, setPage] = useState(0);

  const prev = () => setPage(p => (p - 1 + pages) % pages);
  const next = () => setPage(p => (p + 1) % pages);

  // auto-advance only when section visible
  useEffect(() => {
    const section = document.getElementById('avis');
    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {
        setPage(0);
        const id = setInterval(() => setPage(p => (p + 1) % pages), 5000);
        observer.disconnect();
        return () => clearInterval(id);
      }
    }, { threshold: 0.3 });
    if (section) observer.observe(section);
    return () => observer.disconnect();
  }, [pages]);

  return (
    <section className="avis-v2 reveal" id="avis" data-screen-label="Avis">
      <div className="avis-v2-header">
        <h2 className="section-title">{t.avisTitle[0]}<br/>{t.avisTitle[1]}</h2>
        <div className="avis-v2-meta">
          <span className="avis-v2-sub">★ 5.0 · Planity · 274 avis</span>
          <div className="avis-nav">
            <button className="avis-nav-btn" onClick={prev}>←</button>
            <button className="avis-nav-btn" onClick={next}>→</button>
          </div>
        </div>
      </div>
      <div className="avis-track-outer">
        <div className="avis-track" style={{ transform: `translateX(calc(-${page * 100}% - ${page * 2}px))` }}>
          {t.avis.map((a, i) => (
            <div key={i} className="avis-v2-card">
              <div className="avis-v2-num">0{i+1}</div>
              <div className="avis-v2-stars">
                {[...Array(5)].map((_,j) => <span key={j} className="avis-v2-star">★</span>)}
              </div>
              <p className="avis-v2-text">"{a.text}"</p>
              <span className="avis-v2-author">— {a.author}</span>
              {a.date && <div className="avis-v2-date">{a.date}</div>}
            </div>
          ))}
        </div>
      </div>
      <div className="avis-dots">
        {[...Array(pages)].map((_, i) => (
          <div key={i} className={`avis-dot ${i === page ? 'active' : ''}`} onClick={() => setPage(i)}/>
        ))}
      </div>
    </section>
  );
}

                  style={{whiteSpace:'pre-line',color:'inherit',textDecoration:'underline',textUnderlineOffset:3,opacity:0.8}} className="res-v2-item-val">
                  {item.val}
                </a>
              ) : (
                <span className="res-v2-item-val" style={{whiteSpace:'pre-line'}}>{item.val}</span>
              )}
            </div>
          ))}
        </div>
      </div>
      <div className="res-v2-right">
        <div className="planity-v2">
          <div className="planity-v2-header">
            <span className="planity-v2-title">{t.planityTitle}</span>
            <span className="planity-v2-badge">{t.planityBadge}</span>
          </div>
          <div className="planity-v2-body">
            <div className="planity-v2-label">{t.planityLabel}</div>
            <div className="planity-v2-slots">
              {t.planitySlots.map((slot, i) => (
                <div key={i}
                  className={`planity-v2-slot ${selected===i?'selected':''}`}
                  onClick={() => setSelected(selected===i?null:i)}>
                  {slot}
                </div>
              ))}
            </div>
            {selected !== null && (
              <button className="btn-dark" style={{width:'100%', marginBottom:16}} onClick={() => window.open(PLANITY_URL,'_blank')}>{t.cta1}</button>
            )}
            <a href={PLANITY_URL} target="_blank" rel="noopener noreferrer" className="btn-dark"
              style={{display:'block',width:'100%',textAlign:'center',textDecoration:'none',padding:'14px 0',fontSize:10,letterSpacing:'0.2em'}}>
              {t.cta1} →
            </a>
          </div>
        </div>
      </div>
    </section>
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [lang, setLang] = useState('fr');
  const [scrolled, setScrolled] = useState(false);
  const t = T[lang];

  useEffect(() => {
    const onScroll = () => {
      setScrolled(window.pageYOffset > 60);
      document.querySelectorAll('.reveal, .reveal-left').forEach(el => {
        if (el.getBoundingClientRect().top < window.innerHeight * 0.88) el.classList.add('revealed');
      });
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  return (
    <>
      <TweaksPanel>
        <TweakSection label="Langue">
          <TweakRadio label="Langue" value={lang}
            options={[{value:'fr',label:'Français'},{value:'en',label:'English'}]}
            onChange={setLang}/>
        </TweakSection>
        <TweakSection label="Éléments">
          <TweakToggle label="Bande défilante" value={tweaks.showMarquee} onChange={v => setTweak('showMarquee', v)}/>
        </TweakSection>
        <TweakSection label="Style cartes">
          <TweakRadio label="Avis" value={tweaks.cardStyle}
            options={[{value:'minimal',label:'Minimal'},{value:'lined',label:'Ligné'}]}
            onChange={v => setTweak('cardStyle', v)}/>
        </TweakSection>
      </TweaksPanel>

      <Nav t={t} lang={lang} setLang={setLang} scrolled={scrolled}/>
      <Hero t={t}/>
      <Marquee show={tweaks.showMarquee}/>
      <AboutStrip t={t}/>
      <Services t={t}/>
      <Galerie t={t}/>
      <Avis t={t}/>
      <Reservation t={t}/>
      <MapSection/>
      <Footer t={t}/>

      <div style={{display:'none',position:'fixed',bottom:0,left:0,right:0,zIndex:999,padding:'14px 24px',background:'#141414',textAlign:'center',fontSize:11,fontWeight:500,letterSpacing:'0.2em',textTransform:'uppercase',color:'#F2EDE4',cursor:'pointer'}}
        className="mobile-cta"
        onClick={() => window.open(PLANITY_URL,'_blank')}>
        {t.navCta}
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
